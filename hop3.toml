# Hop3 configuration for AIPress24 (native Python build).
#
# Two deployment modes are supported from this one file:
#   - Real deploy:  operator restores the production DB dump and sets real
#                   secrets/config out of band (see scripts/hop3-config.example.sh).
#   - Blank / CI:   empty postgres, no real secrets; the app boots on the
#                   committed development defaults and is seeded by before-run
#                   when FLASK_SEED_BLANK is set (see scripts/hop3-ci-config.sh).
#
# Secrets are NEVER committed here (this repo is public). They are applied with
# `hop3 config set`. See scripts/README-hop3.md.

[metadata]
id = "aipress24"
title = "AIPress24"
description = "Press and media management platform"
homepage = "https://aipress24.com"
license = "AGPL-3.0-only"

[build]
# Native build: Hop3's Python toolchain installs from uv.lock (uv sync --no-dev)
# automatically, and the frontend is served from the committed vite/dist — so no
# explicit before-build and no Node toolchain are needed.
builder = "local"
# Build-time system packages: compilers + headers for psycopg2 (libpq-dev),
# python-magic (libmagic-dev) and WeasyPrint (Pango/Cairo/HarfBuzz); git because
# uv.lock pins a git dependency. (Mirrors nua/nua-config.toml.)
packages = [
    "build-essential",
    "python3-dev",
    "git",
    "libmagic-dev",
    "libpq-dev",
    "libpango1.0-dev",
    "libcairo-gobject2",
    "libharfbuzz-gobject0",
    "libpango-1.0-0",
    "libpangocairo-1.0-0",
    "libpangoft2-1.0-0",
    "libpangoxft-1.0-0",
]

[run]
# Apply migrations, then seed ONLY when FLASK_SEED_BLANK is set (blank/CI). On a
# real-data deploy the flag is unset, so this is just `flask db upgrade`.
before-run = ["sh scripts/hop3-before-run.sh"]
# gunicorn binds 0.0.0.0:$PORT and loads the app factory. Runs from the repo root
# (where etc/settings.toml, migrations/ and wsgi.py live).
start = "gunicorn -b 0.0.0.0:$PORT -w 2 'app.flask.main:create_app()'"
start-timeout = 180
# Runtime shared libraries (psycopg2, python-magic, WeasyPrint PDF rendering).
# `git` is needed by `flask bootstrap` (blank/CI seed clones the reference-data
# repo); harmless for real deploys.
packages = [
    "git",
    "libpq5",
    "libmagic1",
    "libpango-1.0-0",
    "libpangocairo-1.0-0",
    "libpangoft2-1.0-0",
    "libcairo-gobject2",
    "libharfbuzz-gobject0",
]

[run.workers]
# Background task queue + scheduler (dramatiq-pg, backed by the postgres addon).
worker = "flask queue worker --threads 4"
scheduler = "flask queue scheduler"

[env]
# App-internal secrets generated by Hop3 on first deploy (CSPRNG), stored
# server-side, and never rotated (generated-once). No manual `hop3 config set`.
# FLASK_* maps through Dynaconf to SECRET_KEY / SECURITY_PASSWORD_SALT. The salt
# must stay stable (rotating it invalidates stored password hashes) — which is
# exactly the generated-once guarantee. All OTHER secrets (mail, S3, Stripe,
# Typesense, Sentry) are operator-supplied; see scripts/hop3-config.example.sh.
FLASK_SECRET_KEY = { generate = "urlsafe", length = 48 }
FLASK_SECURITY_PASSWORD_SALT = { generate = "urlsafe", length = 32 }

[domains]
# Public hostname for the real deploy. A CI/blank deploy uses its own host and
# sets FLASK_SERVER_NAME='' (see scripts/hop3-ci-config.sh) to accept any host.
list = ["aipress24.com", "aipress24.hop3.abilian.com"]

[[addons]]
# Provisions the database and injects DATABASE_URL at runtime (the app maps it to
# SQLALCHEMY_DATABASE_URI). Never set DATABASE_URL by hand.
type = "postgres"

[healthcheck]
# Queries the User table — exercises DB connectivity. No auth required.
path = "/system/health"
timeout = 30
