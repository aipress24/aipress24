# Hop3 configuration for AIPress24
# Flask press/media platform; deployed via `hop3 deploy aipress24`.

[metadata]
id = "aipress24"
title = "AIPress24"
description = "Press and media management platform"
license = "AGPL-3.0-only"

[build]
builder = "docker"

[run]
start = "gunicorn -b 0.0.0.0:$PORT -w 2 'app.flask.main:create_app()'"
before-run = ["flask db upgrade"]

[run.workers]
worker = "flask queue worker"
scheduler = "flask queue scheduler"

[env]
HOST_NAME = "aipress24.hop3.abilian.com"
FLASK_FAKE_DATA = "False"

[[addons]]
type = "postgres"

[[addons]]
type = "redis"

[healthcheck]
path = "/system/health"
timeout = 30
