<div x-show="tab === 'events'">
  <h2 class="text-lg font-bold mb-2">Evénements</h2>

  {% set events = org.events %}
  {% if events %}
    <ul role="list" class="grid gap-6 grid-cols-1 md:grid-cols-2">
      {% for event in events %}
        <li class="bg-white rounded shadow">
          {{ component("event-card", event, class_="bg-gray-100") }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>L'organisation n'a publié aucun événement.</p>
  {% endif %}
</div>
